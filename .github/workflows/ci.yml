name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Point platform-go replace at vendored copy
        run: go mod edit -replace=github.com/alvor-technologies/iag-platform-go=./third_party/platform-go

      - name: Test
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Railway Dockerfile
        run: docker build -f Dockerfile -t iag-contract-management:ci .
