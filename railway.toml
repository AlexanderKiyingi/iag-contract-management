# Railway config-as-code for iag-contract-management (repo root = service root).
# railway.json mirrors this config (Railway reads either). Root directory must be `/`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
